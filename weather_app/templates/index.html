<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .search-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            position: relative;
        }

        .search-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-container button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .search-container button:hover {
            background: #764ba2;
        }

        .suggestions {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            width: calc(100% - 110px);
            top: 100%;
            left: 0;
            z-index: 1000;
            margin-top: 5px;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: #f5f5f5;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .current-weather {
            text-align: center;
        }

        .location-name {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .temperature {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3em;
            color: #333;
            font-weight: bold;
        }

        .hourly-forecast {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .hourly-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
        }

        .hourly-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .hour-item {
            flex-shrink: 0;
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            min-width: 80px;
        }

        .hour-time {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .hour-temp {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
        }

        .daily-forecast {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .daily-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
        }

        .daily-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .day-item {
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
            transition: background 0.3s;
        }

        .day-item:hover {
            background: #e9e9e9;
        }

        .day-date {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .day-temps {
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .day-precipitation {
            font-size: 0.85em;
            color: #999;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information for any location</p>
        </div>

        <div style="position: relative;">
            <div class="search-container">
                <input 
                    type="text" 
                    id="locationInput" 
                    placeholder="Search for a city or location..."
                    autocomplete="off"
                >
                <button onclick="searchWeather()">Search</button>
            </div>
            <div id="suggestions" class="suggestions" style="display: none;"></div>
        </div>

        <div id="errorContainer"></div>
        <div id="weatherContainer"></div>
    </div>

    <script>
        let debounceTimer;

        // Geolocation on page load
        window.addEventListener('load', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        fetchWeather(position.coords.latitude, position.coords.longitude);
                    },
                    () => {
                        // Fallback to default location (New York)
                        fetchWeather(40.7128, -74.0060);
                    }
                );
            }
        });

        // Location search with autocomplete
        document.getElementById('locationInput').addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value;

            if (query.length < 2) {
                document.getElementById('suggestions').style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(() => {
                fetch(`/api/search-location?query=${query}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.results && data.results.length > 0) {
                            const suggestionsDiv = document.getElementById('suggestions');
                            suggestionsDiv.innerHTML = data.results
                                .slice(0, 8)
                                .map(result => `
                                    <div class="suggestion-item" onclick="selectLocation(${result.latitude}, ${result.longitude}, '${result.name}${result.admin1 ? ', ' + result.admin1 : ''}${result.country ? ', ' + result.country : ''}')">
                                        <strong>${result.name}</strong>
                                        ${result.admin1 ? '<br>' + result.admin1 : ''}
                                        ${result.country ? '<br>' + result.country : ''}
                                    </div>
                                `)
                                .join('');
                            suggestionsDiv.style.display = 'block';
                        }
                    });
            }, 300);
        });

        function selectLocation(lat, lon, name) {
            document.getElementById('locationInput').value = name;
            document.getElementById('suggestions').style.display = 'none';
            fetchWeather(lat, lon);
        }

        function searchWeather() {
            const query = document.getElementById('locationInput').value;
            if (query.length > 0) {
                fetch(`/api/search-location?query=${query}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.results && data.results.length > 0) {
                            const result = data.results[0];
                            fetchWeather(result.latitude, result.longitude);
                        }
                    });
            }
        }

        function fetchWeather(latitude, longitude) {
            document.getElementById('weatherContainer').innerHTML = '<div class="loading">Loading weather data...</div>';
            document.getElementById('errorContainer').innerHTML = '';

            fetch(`/api/weather?latitude=${latitude}&longitude=${longitude}`)
                .then(res => res.json())
                .then(data => {
                    renderWeather(data);
                })
                .catch(error => {
                    document.getElementById('errorContainer').innerHTML = `<div class="error">Error fetching weather: ${error.message}</div>`;
                });
        }

        function renderWeather(data) {
            const current = data.current;
            const hourly = data.hourly;
            const daily = data.daily;
            const timezone = data.timezone;

            let html = `
                <div class="weather-grid">
                    <div class="weather-card current-weather">
                        <div class="location-name">${timezone.split('/')[1].replace(/_/g, ' ')}</div>
                        <div class="temperature">${Math.round(current.temperature_2m)}°C</div>
                        <div class="weather-description">${getWeatherDescription(current.weather_code)}</div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${current.relative_humidity_2m}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind Speed</div>
                                <div class="detail-value">${Math.round(current.wind_speed_10m)} km/h</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="hourly-forecast">
                    <div class="hourly-title">Hourly Forecast</div>
                    <div class="hourly-scroll">
                        ${hourly.time.slice(0, 24).map((time, idx) => `
                            <div class="hour-item">
                                <div class="hour-time">${new Date(time).getHours()}:00</div>
                                <div class="hour-temp">${Math.round(hourly.temperature_2m[idx])}°C</div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="daily-forecast">
                    <div class="daily-title">7-Day Forecast</div>
                    <div class="daily-items">
                        ${daily.time.map((date, idx) => `
                            <div class="day-item">
                                <div class="day-date">${new Date(date).toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'})}</div>
                                <div class="day-temps">${Math.round(daily.temperature_2m_max[idx])}° / ${Math.round(daily.temperature_2m_min[idx])}°</div>
                                <div class="day-precipitation">Rain: ${Math.round(daily.precipitation_sum[idx] * 10) / 10} mm</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = html;
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with slight hail',
                99: 'Thunderstorm with heavy hail'
            };
            return descriptions[code] || 'Unknown';
        }

        // Allow Enter key to search
        document.getElementById('locationInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'locationInput') {
                document.getElementById('suggestions').style.display = 'none';
            }
        });
    </script>
</body>
</html>
